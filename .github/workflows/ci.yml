name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install npm dependencies (Tailwind CSS)
        run: npm install
        working-directory: src/MattGPT.Web

      - name: Restore dependencies
        run: dotnet restore MattGPT.slnx

      - name: Build
        run: dotnet build MattGPT.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test MattGPT.slnx --no-build --configuration Release --verbosity normal
